<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גשר מילים</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif;
    background: #0f0f1a;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  h1 {
    font-size: 2.2rem;
    color: #f0c040;
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 24px; text-align: center; }

  #game-screen, #summary-screen { width: 100%; max-width: 560px; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 0.95rem;
    color: #aaa;
  }
  .score-val { color: #f0c040; font-size: 1.2rem; font-weight: bold; }

  /* Puzzle */
  .puzzle-box {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 16px;
  }

  .words-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .word-chip {
    background: #2a2a4a;
    border: 2px solid #444;
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 1.6rem;
    font-weight: bold;
    color: #d0d0ff;
    min-width: 90px;
    text-align: center;
  }

  .connector {
    color: #555;
    font-size: 1.4rem;
    font-weight: bold;
  }


  /* Letter boxes row */
  .letter-boxes {
    display: flex;
    flex-direction: row; /* in dir=rtl context, row flows right→left so DOM[0]=rightmost */
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .letter-boxes.shake { animation: shake 0.3s ease; }

  .letter-box {
    width: 46px;
    height: 54px;
    background: #111;
    border: 2px dashed #555;
    border-radius: 8px;
    font-size: 1.5rem;
    font-weight: bold;
    color: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .letter-box.filled   { border-style: solid; border-color: #8080cc; background: #1a1a3a; }
  .letter-box.correct  { border-color: #40c070; color: #40c070; background: #002a10; border-style: solid; }
  .letter-box.revealed { border-color: #f0c040; color: #f0c040; background: #2a2000; border-style: solid; }

  /* Letter buttons grid */
  .letter-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
    direction: rtl;
  }

  .letter-btn {
    background: #2a2a4a;
    border: 2px solid #555;
    border-radius: 10px;
    width: 46px;
    height: 46px;
    font-size: 1.3rem;
    font-weight: bold;
    color: #d0d0ff;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s, opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
  }
  .letter-btn:hover { background: #3a3a6a; transform: translateY(-2px); }
  .letter-btn:active { transform: translateY(0); }
  .letter-btn:disabled { opacity: 0.25; cursor: default; transform: none; }

  /* Action buttons row */
  .action-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 12px;
  }

  #delete-btn {
    background: #3a1a1a;
    border: 1px solid #664444;
    color: #e08080;
    padding: 8px 16px;
    font-size: 0.95rem;
  }
  #delete-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  #back-btn, #skip-btn {
    background: #2a2a4a;
    border: 1px solid #555;
    color: #aaa;
    font-size: 0.9rem;
  }
  #back-btn:disabled, #skip-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    font-weight: bold;
    transition: transform 0.1s, background 0.2s;
  }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(0); }

  #submit-btn {
    background: #f0c040;
    color: #111;
  }
  #submit-btn:disabled { background: #555; color: #888; cursor: default; transform: none; }

  #hint-btn {
    background: #2a2a4a;
    border: 1px solid #555;
    color: #aaa;
    font-size: 0.9rem;
  }
  #hint-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* Feedback */
  #feedback {
    min-height: 28px;
    text-align: center;
    font-size: 1rem;
    padding: 4px;
    border-radius: 8px;
    transition: all 0.3s;
  }
  #feedback.ok  { color: #40c070; }
  #feedback.err { color: #e05050; }
  #feedback.info{ color: #f0c040; }

  #phrase-reveal {
    min-height: 22px;
    text-align: center;
    font-size: 0.9rem;
    color: #888;
    margin-top: 6px;
    direction: rtl;
  }

  /* Hint text */
  #hint-text {
    min-height: 22px;
    text-align: center;
    font-size: 0.9rem;
    color: #a090ff;
    margin-top: 8px;
    font-style: italic;
  }

  /* Mistakes indicator */
  .mistakes {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
  }
  .heart { font-size: 1.1rem; transition: opacity 0.3s; }
  .heart.gone { opacity: 0.2; }

  /* Next button */
  #next-btn {
    display: none;
    background: #4060e0;
    color: #fff;
    margin: 14px auto 0;
    padding: 12px 36px;
    font-size: 1.1rem;
    border-radius: 12px;
  }

  /* Summary screen */
  #summary-screen {
    display: none;
    text-align: center;
  }
  #summary-screen h2 { font-size: 2rem; color: #f0c040; margin-bottom: 16px; }
  .final-score { font-size: 3.5rem; color: #f0c040; font-weight: bold; margin: 16px 0; }
  .summary-detail { color: #aaa; font-size: 1rem; margin-bottom: 24px; }
  #restart-btn { background: #f0c040; color: #111; font-size: 1.2rem; padding: 14px 40px; border-radius: 14px; }

  /* Correct animation */
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.35s ease; }
</style>
</head>
<body>

<h1>🌉 גשר מילים</h1>
<p class="subtitle">מצא את המילה שמחברת בין השתיים</p>

<!-- Game Screen -->
<div id="game-screen">
  <div class="top-bar">
    <span>שאלה <span id="q-num">1</span> מתוך 10</span>
    <span>ניקוד: <span class="score-val" id="score-display">0</span></span>
  </div>

  <div class="puzzle-box">
    <div class="words-row">
      <div class="word-chip" id="word-left"></div>
      <span class="connector">+</span>
      <div class="letter-boxes" id="letter-boxes"></div>
      <span class="connector">+</span>
      <div class="word-chip" id="word-right"></div>
    </div>

    <div class="letter-grid" id="letter-grid"></div>

    <div class="action-row">
      <button id="delete-btn">⌫ מחק</button>
      <button id="submit-btn">שלח ✓</button>
    </div>

    <div id="hint-text"></div>
    <div id="feedback"></div>
    <div id="phrase-reveal"></div>

    <div class="mistakes">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3">❤️</span>
    </div>
  </div>

  <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
    <button id="back-btn">⏮ חזור</button>
    <button id="hint-btn">💡 רמז (−20 נק')</button>
    <button id="skip-btn">דלג ⏭</button>
  </div>

  <button id="next-btn">הבא ←</button>
</div>

<!-- Summary Screen -->
<div id="summary-screen">
  <h2>🎉 סיום המשחק!</h2>
  <div class="final-score" id="final-score">0</div>
  <div class="summary-detail" id="summary-detail"></div>
  <button id="restart-btn">שחק שוב</button>
</div>

<script>
// ─── PUZZLE DATA ────────────────────────────────────────────────────
const ALL_PUZZLES = [
  // EASY
  { left: "בית",    right: "בישול",   bridge: "ספר",     hint: "מה יש בספרייה שאפשר גם לבשל ממנו?" },
  { left: "גן",     right: "מחמד",    bridge: "חיות",    hint: "אריות ופילים שם — אבל גם חיית הבית שלך" },
  { left: "כוס",   right: "ירוק",    bridge: "תה",      hint: "שתייה חמה מיפן" },
  { left: "כוס",   right: "שחור",    bridge: "קפה",     hint: "שתייה עם קפאין, בוקר בוקר" },
  { left: "כוס",   right: "מינרלים", bridge: "מים",     hint: "צריך לשתות שמונה ביום" },
  { left: "כדור",  right: "שולחן",   bridge: "רגל",     hint: "22 שחקנים ומגרש ירוק; גם ריהוט" },
  { left: "עץ",    right: "טרי",     bridge: "פרי",     hint: "גדל בטבע וטעים לאכול" },
  { left: "כיכר",  right: "חיטה",    bridge: "לחם",     hint: "מה אופים ואוכלים כל יום" },
  { left: "ים",    right: "בישול",   bridge: "מלח",     hint: "הכי מלוח בעולם — גם תבלין" },
  { left: "בית",   right: "חלב",     bridge: "קפה",     hint: "מקום לשתות ולשוחח עם חברים" },
  { left: "בית",   right: "ישראל",   bridge: "כנסת",    hint: "מקום תפילה ומקום חקיקה — שניהם בירושלים" },
  { left: "כדור",  right: "ישראל",   bridge: "ארץ",     hint: "עגול, כחול-ירוק" },
  { left: "שעון",  right: "שנייה",   bridge: "יד",      hint: "לובשים על הפרק; קונים גם ישן" },
  { left: "כלב",   right: "ספר",     bridge: "בית",     hint: "גר שם אחד, לומדים בשני" },
  { left: "עוגת",  right: "חם",      bridge: "שוקולד",  hint: "הכי טעים" },
  // MEDIUM
  { left: "שר",    right: "מיוחד",   bridge: "חינוך",   hint: "חבר ממשלה שאחראי על בתי הספר" },
  { left: "שוק",   right: "רחוב",    bridge: "אוכל",    hint: "אוכלים ביד תוך כדי הליכה" },
  { left: "חדר",   right: "עמוקה",   bridge: "שינה",    hint: "חדר מיוחד ומנוחה טובה" },
  { left: "שולחן", right: "בית",     bridge: "עבודה",   hint: "עובדים עליו; ויש גם כזו שמגישים למורה" },
  { left: "יום",   right: "גדול",    bridge: "חופש",    hint: "שמחה לתלמידים — קורה בקיץ" },
  { left: "מחנה",  right: "חם",      bridge: "קיץ",     hint: "חוויה בחופש הגדול" },
  { left: "תיק",   right: "נייד",    bridge: "מחשב",    hint: "נושאים לעבודה" },
  { left: "מספר",  right: "חכם",     bridge: "טלפון",   hint: "מחייגים אחד, נושאים השני" },
  { left: "כוכב",  right: "פעולה",   bridge: "סרט",     hint: "שחקן מפורסם בז'אנר מסוים" },
  { left: "ביטוח", right: "הציבור",  bridge: "בריאות",  hint: "שמירה על הגוף — של כולם" },
  { left: "מכתב",  right: "ראשונה",  bridge: "אהבה",    hint: "כותבים לאהוב/ה ולא שוכחים לעולם" },
  { left: "בקבוק", right: "זית",     bridge: "שמן",     hint: "יוצקים על הסלט" },
  { left: "ציפור", right: "ערש",     bridge: "שיר",     hint: "מה שציפור עושה ומה שרים לתינוק" },
  { left: "ניתוח", right: "פתוח",    bridge: "לב",      hint: "ניתוח חשוב ולב ללא סודות" },
  { left: "ניהול", right: "פנוי",    bridge: "זמן",     hint: "משהו שתמיד חסר לכולם" },
  // HARD
  { left: "רמת",   right: "ארוכים",  bridge: "חיים",    hint: "מה חשוב בחיים ומה מאחלים" },
  { left: "חנות",  right: "ילדים",   bridge: "ספר",     hint: "מוכרת ספרים וכותב לגיל הצעיר" },
  { left: "לוח",   right: "חדשה",    bridge: "שנה",     hint: "תולים על הקיר ומאחלים בראש השנה" },
  { left: "שדה",   right: "אזרחית",  bridge: "תעופה",   hint: "נמל תעופה ותעופה לא צבאית" },
  { left: "מיץ",   right: "מתוק",    bridge: "תפוח",    hint: "שתייה מפרי ופרי מתוק" },
  { left: "נורת",  right: "ירוק",    bridge: "אור",     hint: "מה שמאיר ומה שמרמז להמשיך" },
  { left: "שיחת",  right: "ציבורי",  bridge: "טלפון",   hint: "שיחה רגילה ומה שעמד פעם ברחוב" },
  { left: "כוס",   right: "אדום",    bridge: "יין",     hint: "שתייה בחגיגות" },
  { left: "מגש",   right: "ים",      bridge: "פירות",   hint: "מה מגישים לאורחים ומה גדל ליד הים" },
  { left: "אורח",  right: "לילה",    bridge: "חיים",    hint: "דרך חיים ופעילות בשעות החושך" },
];

// ─── GAME STATE ───────────────────────────────────────────────────
const ROUND_COUNT  = 10;
const POINTS_CORRECT = 100;
const POINTS_HINT    = -20;
const POINTS_WRONG   = -10;
const HEBREW_LETTERS = 'אבגדהוזחטיכלמנסעפצקרשת'.split('');

let puzzles = [];
let current  = 0;
let score    = 0;
let mistakes = 0;
let hintUsed = false;
let answered = false;
let correctAnswers = 0;
let builtWord = '';
let scoreHistory = []; // score before each question, for restoring on go-back

// ─── DOM ──────────────────────────────────────────────────────────
const gameScreen    = document.getElementById('game-screen');
const summaryScreen = document.getElementById('summary-screen');
const qNum          = document.getElementById('q-num');
const scoreDisplay  = document.getElementById('score-display');
const wordLeft      = document.getElementById('word-left');
const wordRight     = document.getElementById('word-right');
const letterBoxes   = document.getElementById('letter-boxes');
const letterGrid    = document.getElementById('letter-grid');
const submitBtn     = document.getElementById('submit-btn');
const deleteBtn     = document.getElementById('delete-btn');
const hintBtn       = document.getElementById('hint-btn');
const backBtn       = document.getElementById('back-btn');
const skipBtn       = document.getElementById('skip-btn');
const hintText      = document.getElementById('hint-text');
const feedback      = document.getElementById('feedback');
const phraseReveal  = document.getElementById('phrase-reveal');
const nextBtn       = document.getElementById('next-btn');
const hearts        = [document.getElementById('h1'), document.getElementById('h2'), document.getElementById('h3')];
const finalScore    = document.getElementById('final-score');
const summaryDetail = document.getElementById('summary-detail');
const restartBtn    = document.getElementById('restart-btn');

// ─── HELPERS ─────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return s.trim().replace(/[ְִֵֶַָּׁׂ]/g, ''); // strip niqqud
}

// ─── INIT ─────────────────────────────────────────────────────────
function initGame() {
  puzzles = shuffle(ALL_PUZZLES).slice(0, ROUND_COUNT);
  current = 0;
  score   = 0;
  correctAnswers = 0;
  scoreHistory = [];
  summaryScreen.style.display = 'none';
  gameScreen.style.display    = 'block';
  showQuestion();
}

// ─── LETTER GENERATION ────────────────────────────────────────────
function buildLetters(bridge) {
  const pool = [...bridge.split('')];
  const usedExtras = new Set();
  while (pool.length < 14) {
    const r = HEBREW_LETTERS[Math.floor(Math.random() * HEBREW_LETTERS.length)];
    if (!usedExtras.has(r) || pool.length > 10) {
      pool.push(r);
      usedExtras.add(r);
    }
  }
  return shuffle(pool);
}

function renderLetters(letters) {
  letterGrid.innerHTML = '';
  letters.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.textContent = letter;
    btn.addEventListener('click', () => clickLetter(btn, letter));
    letterGrid.appendChild(btn);
  });
}

function renderBoxes(length) {
  letterBoxes.innerHTML = '';
  for (let i = 0; i < length; i++) {
    const box = document.createElement('div');
    box.className = 'letter-box';
    box.dataset.pos = i;
    letterBoxes.appendChild(box);
  }
}

function fillNextBox(letter) {
  // boxes are flex-direction: row-reverse, so DOM order 0 = rightmost visually
  // we fill by builtWord.length-1 index
  const boxes = letterBoxes.querySelectorAll('.letter-box');
  const idx = builtWord.length - 1; // just added
  if (boxes[idx]) {
    boxes[idx].textContent = letter;
    boxes[idx].classList.add('filled');
  }
}

function clearLastBox() {
  const boxes = letterBoxes.querySelectorAll('.letter-box');
  const idx = builtWord.length; // after slice, length is already reduced
  if (boxes[idx]) {
    boxes[idx].textContent = '';
    boxes[idx].classList.remove('filled');
  }
}

function clickLetter(btn, letter) {
  if (answered || btn.disabled) return;
  const bridge = puzzles[current].bridge;
  if (builtWord.length >= bridge.length) return; // boxes full
  btn.disabled = true;
  builtWord += letter;
  fillNextBox(letter);
}

// ─── QUESTION ─────────────────────────────────────────────────────
function showQuestion() {
  const p = puzzles[current];
  mistakes  = 0;
  hintUsed  = false;
  answered  = false;
  builtWord = '';

  qNum.textContent         = current + 1;
  scoreDisplay.textContent = score;
  wordLeft.textContent     = p.left;
  wordRight.textContent    = p.right;
  submitBtn.disabled       = false;
  deleteBtn.disabled       = false;
  hintBtn.disabled         = false;
  hintText.textContent     = '';
  feedback.textContent     = '';
  feedback.className       = '';
  phraseReveal.textContent = '';
  nextBtn.style.display    = 'none';

  scoreHistory[current] = score; // save score before this question
  backBtn.disabled = (current === 0);
  skipBtn.disabled = false;

  hearts.forEach(h => h.classList.remove('gone'));
  renderBoxes(p.bridge.length);
  renderLetters(buildLetters(p.bridge));
}

// ─── DELETE ───────────────────────────────────────────────────────
function deleteLetter() {
  if (answered || !builtWord.length) return;
  const removed = builtWord[builtWord.length - 1];
  builtWord = builtWord.slice(0, -1);
  clearLastBox();
  // Re-enable the last disabled button with this letter
  const btns = [...letterGrid.querySelectorAll('.letter-btn')];
  const toEnable = btns.filter(b => b.disabled && b.textContent === removed);
  if (toEnable.length) toEnable[toEnable.length - 1].disabled = false;
}

// ─── SUBMIT ───────────────────────────────────────────────────────
function handleSubmit() {
  if (answered) return;
  const raw = builtWord.trim();
  if (!raw) return;

  const p = puzzles[current];
  if (normalize(raw) === normalize(p.bridge)) {
    correctGuess();
  } else {
    wrongGuess(raw);
  }
}

function correctGuess() {
  answered = true;
  addScore(POINTS_CORRECT);
  correctAnswers++;

  letterBoxes.querySelectorAll('.letter-box').forEach(b => {
    b.classList.remove('filled');
    b.classList.add('correct');
  });
  letterBoxes.classList.add('pop');

  const p = puzzles[current];
  phraseReveal.textContent = `✅  ${p.left} ${p.bridge}  •  ${p.bridge} ${p.right}`;
  setFeedback(`נכון! 🎉 +${POINTS_CORRECT}`, 'ok');

  disableAll();
  showNextBtn();
}

function wrongGuess(raw) {
  mistakes++;
  addScore(POINTS_WRONG);

  if (mistakes < 3) {
    hearts[3 - mistakes].classList.add('gone');
    setFeedback(`"${raw}" — לא נכון. נסה שוב! (${POINTS_WRONG} נק')`, 'err');
    // Reset built word, clear boxes, re-enable letter buttons
    builtWord = '';
    letterBoxes.querySelectorAll('.letter-box').forEach(b => {
      b.textContent = '';
      b.classList.remove('filled');
    });
    letterBoxes.classList.add('shake');
    setTimeout(() => letterBoxes.classList.remove('shake'), 350);
    [...letterGrid.querySelectorAll('.letter-btn')].forEach(b => b.disabled = false);
  } else {
    hearts[0].classList.add('gone');
    revealAnswer();
  }
}

function revealAnswer() {
  answered = true;
  disableAll();

  const p = puzzles[current];
  // Fill boxes with the correct answer letters
  const boxes = letterBoxes.querySelectorAll('.letter-box');
  [...p.bridge].forEach((letter, i) => {
    if (boxes[i]) {
      boxes[i].textContent = letter;
      boxes[i].classList.remove('filled');
      boxes[i].classList.add('revealed');
    }
  });
  phraseReveal.textContent = `${p.left} ${p.bridge}  •  ${p.bridge} ${p.right}`;
  setFeedback('😔 נגמרו הניסיונות. זו הייתה התשובה.', 'info');

  showNextBtn();
}

function disableAll() {
  submitBtn.disabled = true;
  deleteBtn.disabled = true;
  hintBtn.disabled   = true;
  skipBtn.disabled   = true;
  [...letterGrid.querySelectorAll('.letter-btn')].forEach(b => b.disabled = true);
}

// ─── SKIP ─────────────────────────────────────────────────────────
function skipQuestion() {
  if (answered) return;
  answered = true;
  disableAll();
  const p = puzzles[current];
  // reveal the answer without penalizing
  const boxes = letterBoxes.querySelectorAll('.letter-box');
  [...p.bridge].forEach((letter, i) => {
    if (boxes[i]) {
      boxes[i].textContent = letter;
      boxes[i].classList.remove('filled');
      boxes[i].classList.add('revealed');
    }
  });
  phraseReveal.textContent = `${p.left} ${p.bridge}  •  ${p.bridge} ${p.right}`;
  setFeedback('⏭ דולגה — זו הייתה התשובה.', 'info');
  showNextBtn();
}

// ─── GO BACK ──────────────────────────────────────────────────────
function goBack() {
  if (current === 0) return;
  current--;
  // restore score to what it was before the previous question
  score = scoreHistory[current];
  scoreDisplay.textContent = score;
  showQuestion();
}

// ─── HINT ─────────────────────────────────────────────────────────
function useHint() {
  if (hintUsed || answered) return;
  hintUsed = true;
  hintBtn.disabled = true;
  addScore(POINTS_HINT);
  hintText.textContent = '💡 ' + puzzles[current].hint;
}

// ─── NEXT ─────────────────────────────────────────────────────────
function showNextBtn() {
  nextBtn.style.display = 'block';
  nextBtn.textContent   = current < ROUND_COUNT - 1 ? 'הבא ←' : 'סיום 🏁';
}

function goNext() {
  current++;
  if (current < ROUND_COUNT) showQuestion();
  else showSummary();
}

// ─── SCORE ────────────────────────────────────────────────────────
function addScore(delta) {
  score = Math.max(0, score + delta);
  scoreDisplay.textContent = score;
}

// ─── FEEDBACK ─────────────────────────────────────────────────────
function setFeedback(msg, cls) {
  feedback.textContent  = msg;
  feedback.className    = cls;
}

// ─── SUMMARY ─────────────────────────────────────────────────────
function showSummary() {
  gameScreen.style.display    = 'none';
  summaryScreen.style.display = 'block';
  finalScore.textContent = score;

  let rank;
  if (score >= 750)      rank = '🏆 מוח מקשר! מושלם';
  else if (score >= 500) rank = '🥈 מצוין! כמעט שם';
  else if (score >= 250) rank = '🥉 לא רע! אפשר עוד';
  else                   rank = '💪 אל תוותר — נסה שוב!';

  summaryDetail.textContent = `ענית נכון על ${correctAnswers} מתוך ${ROUND_COUNT} שאלות — ${rank}`;
}

// ─── EVENTS ──────────────────────────────────────────────────────
submitBtn.addEventListener('click', handleSubmit);
deleteBtn.addEventListener('click', deleteLetter);
hintBtn.addEventListener('click', useHint);
backBtn.addEventListener('click', goBack);
skipBtn.addEventListener('click', skipQuestion);
nextBtn.addEventListener('click', goNext);
restartBtn.addEventListener('click', initGame);

// ─── START ────────────────────────────────────────────────────────
initGame();
</script>
</body>
</html>
